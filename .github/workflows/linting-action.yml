name: Lint with Black

on: [push, pull_request]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Set up Python 3.15
        uses: actions/setup-python@v5
        with:
          python-version: '3.15'
      - name: Linting
        uses: psf/black@stable
