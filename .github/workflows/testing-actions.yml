name: example
on: push
jobs:
  greeting:
    runs-on: ubuntu-latest
    steps:
      - name: Greeting!
        run: echo hello world
  run-python-test:
    runs-on: ubuntu-latest
    steps:
      # gets code from the repo using the pre-written action "checkout"
      - uses: actions/checkout@v3

    # Run using python 3.10
      - uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          
      # Run pytest with 3.10
      - name: Test package 
        run: python -m pytest
        
    # Run using python 3.14
      - uses: actions/setup-python@v4
        with:
          python-version: "3.14"
      
      # We need to install pytest in order to run the test
      - name: Install packages 
        run: python -m pip install -e ".[test]"

      # Now, we can run pytest
      - name: Test package 
        run: python -m pytest
      
